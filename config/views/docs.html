  function endpointUrl(def) {
    const path = def.requestPath || def.path;
    const query = def.query ? `?${def.query}` : "";
    return `${BASE_URL}${path}${query}`;
  }

  function prettyJson(value) {
    return JSON.stringify(value, null, 2);
  }

  function jsSnippet(def) {
    const url = endpointUrl(def);
    const lines = [];
    lines.push(`const url = "${url}";`);
    lines.push("");
    lines.push("const response = await fetch(url, {");
    lines.push(`  method: "${def.method}",`);
    lines.push("  headers: {");
    if (def.auth) lines.push('    "x-api-key": "your-api-key",');
    if (def.body) lines.push('    "Content-Type": "application/json",');
    lines.push("  },");
    if (def.body) {
      lines.push(`  body: JSON.stringify(${prettyJson(def.body).replace(/\n/g, "\n  ")}),`);
    }
    lines.push("});");
    lines.push("");
    lines.push("const data = await response.json();");
    lines.push("console.log(data);");
    return lines.join("\n");
  }

  function pySnippet(def) {
    const url = endpointUrl(def);
    const lines = [];
    lines.push("import requests");
    lines.push("");
    lines.push(`url = "${url}"`);
    lines.push("headers = {");
    if (def.auth) lines.push('    "x-api-key": "your-api-key",');
    if (def.body) lines.push('    "Content-Type": "application/json",');
    lines.push("}");
    lines.push("");
    if (def.body) {
      lines.push(`payload = ${prettyJson(def.body).replace(/true/g, "True").replace(/false/g, "False").replace(/null/g, "None")}`);
      lines.push(`response = requests.${def.method.toLowerCase()}(url, headers=headers, json=payload, timeout=30)`);
    } else {
      lines.push(`response = requests.${def.method.toLowerCase()}(url, headers=headers, timeout=30)`);
    }
    lines.push("data = response.json()");
    lines.push("print(data)");
    return lines.join("\n");
  }

  function curlSnippet(def) {
    const url = endpointUrl(def);
    const lines = [];
    lines.push(`curl -X ${def.method} "${url}" \\`);
    if (def.auth) lines.push('  -H "x-api-key: your-api-key" \\');
    if (def.body) lines.push('  -H "Content-Type: application/json" \\');
    if (def.body) lines.push(`  -d '${JSON.stringify(def.body)}'`);
    else lines[lines.length - 1] = lines[lines.length - 1].replace(/ \\\\$/, "");
    return lines.join("\n");
  }

  function createSnippetCard(lang, id, code) {
    const wrapper = document.createElement("div");
    wrapper.className = "snippet";

    const head = document.createElement("div");
    head.className = "snippet-head";

    const label = document.createElement("strong");
    label.textContent = lang;

    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.type = "button";
    btn.dataset.copyTarget = id;
    btn.textContent = "Copy";

    head.appendChild(label);
    head.appendChild(btn);

    const pre = document.createElement("pre");
    const codeEl = document.createElement("code");
    codeEl.id = id;
    codeEl.textContent = code;
    pre.appendChild(codeEl);

    wrapper.appendChild(head);
    wrapper.appendChild(pre);
    return wrapper;
  }

  function renderEndpoints() {
    const mount = document.getElementById("endpoint-docs");
    if (!mount) return;

    endpoints.forEach((def, index) => {
      const article = document.createElement("article");
      article.className = "endpoint-card";

      const h3 = document.createElement("h3");
      h3.textContent = def.title;

      const meta = document.createElement("p");
      meta.className = "endpoint-meta";
      meta.innerHTML = `<code>${def.method}</code> <code>${def.path}</code>${def.auth ? ' <span class="badge-auth">API Key</span>' : ' <span class="badge-public">Public</span>'}`;

      const desc = document.createElement("p");
      desc.className = "endpoint-desc";
      desc.textContent = def.description;

      const snippets = document.createElement("div");
      snippets.className = "snippet-grid";

      snippets.appendChild(createSnippetCard("JavaScript", `ep-${index}-js`, jsSnippet(def)));
      snippets.appendChild(createSnippetCard("Python", `ep-${index}-py`, pySnippet(def)));
      snippets.appendChild(createSnippetCard("cURL", `ep-${index}-curl`, curlSnippet(def)));
      snippets.appendChild(createSnippetCard("Response", `ep-${index}-res`, prettyJson(def.response)));

      article.appendChild(h3);
      article.appendChild(meta);
      article.appendChild(desc);
      article.appendChild(snippets);
      mount.appendChild(article);
    });
  }

  async function copyCode(targetId, button) {
    const el = document.getElementById(targetId);
    if (!el) return;
    const text = el.textContent || "";

    try {
      await navigator.clipboard.writeText(text);
      const prev = button.textContent;
      button.textContent = "Copied";
      setTimeout(() => { button.textContent = prev; }, 1200);
    } catch {
      const prev = button.textContent;
      button.textContent = "Failed";
      setTimeout(() => { button.textContent = prev; }, 1200);
    }
  }

  renderEndpoints();

  document.addEventListener("click", (event) => {
    const button = event.target.closest(".copy-btn");
    if (!button) return;
    const targetId = button.dataset.copyTarget;
    if (!targetId) return;
    copyCode(targetId, button);
  });
})();
